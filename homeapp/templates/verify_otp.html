{% extends "indexnav.html" %}
{% block main %}

<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-lg-5">

            <div class="bg-white p-5 shadow rounded text-center">
                <h3 class="text-primary mb-3">OTP Verification</h3>
                <p>Check your email and enter OTP</p>

                <form method="post">
                    {% csrf_token %}

                    <input type="text" name="otp" class="form-control mb-3 text-center" placeholder="Enter OTP" required>

                    <button class="btn btn-success w-100">
                        Verify OTP
                    </button>
                </form>

                {% if error %}
                <div class="alert alert-danger mt-3">{{ error }}</div>
                {% endif %}

            </div>

        </div>
    </div>
</div>

{% endblock %}
