{% extends "User_nav.html" %}
{% load crispy_forms_tags %}
{% block title %}Write Review{% endblock %}

{% block main %}

<div class="container mt-4">
    <div class="route-card p-4">

        <h5 class="mb-2">
            Review for {{ req.company_id.name }}
        </h5>

        <p class="text-muted mb-3">
            Route: {{ req.route_id.departure_port }} → {{ req.route_id.arrival_port }}
        </p>

        <form method="post">
            {% csrf_token %}

            {{ form|crispy }}

            <!-- ✅ REQUIRED BUTTON -->
            <div class="mt-3">
                <button type="submit" class="btn btn-success">
                    <i class="bi bi-star-fill"></i>
                    Submit Review
                </button>

                <a href="{% url 'LUser:completed_orders' %}"
                   class="btn btn-outline-secondary ms-2">
                   Cancel
                </a>
            </div>

        </form>

    </div>
</div>

{% endblock %}
