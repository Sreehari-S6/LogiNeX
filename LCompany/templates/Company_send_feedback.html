{% extends "company_navbar.html" %}
{% load crispy_forms_tags %}
{% block title %}Send Feedback{% endblock %}

{% block main %}
<div class="container-fluid">

    <!-- Header -->
    <div class="mb-4">
        <h1 class="h2 text-yellow mb-2">Send Feedback</h1>
        <p class="text-gray">
            Share your feedback or queries with admin
        </p>
    </div>

    <div class="row">
        <div class="col-lg-6">

            <div class="card shadow-sm">

                <div class="card-body">

                    <form method="post">
                        {% csrf_token %}

                        {{ form|crispy }}

                        <button class="btn btn-yellow mt-3">
                            <i class="bi bi-send"></i>
                            Send Feedback
                        </button>

                    </form>

                </div>

            </div>

        </div>
    </div>

</div>
{% endblock %}
